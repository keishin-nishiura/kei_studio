<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kei Studio</title>
  <meta name="description" content="Kei Studioの個人開発アプリ紹介サイト" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <p class="logo">Kei Studio</p>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <p class="hero-subtitle">Indie App Developer</p>
        <h1 class="hero-title">Kei Studio</h1>
        <p class="hero-text">
          個人開発アプリを紹介するデベロッパーサイトです。
        </p>
        <a class="hero-button" href="#status">開発状況を見る</a>
      </div>
    </section>

    <section class="status" id="status">
      <div class="container">
        <p class="section-label">Development Status</p>
        <h2 class="section-title">現在の開発フロー</h2>
        <div class="timeline">
          <div class="step done">Idea</div>
          <div class="step done">Planning</div>
          <div class="step current">Development</div>
          <div class="step">Testing</div>
          <div class="step">Release</div>
        </div>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
